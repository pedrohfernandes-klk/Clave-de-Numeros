name: Apply library migration

on:
  push:
    paths:
      - library_payload.b64

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Expand library files
        shell: bash
        run: |
          base64 --decode library_payload.b64 | tar -xz
          rm -f library_payload.b64
          rm -f .github/workflows/apply-library-migration.yml

      - name: Commit completed migration
        shell: bash
        run: |
          git config user.name "Clave content migration"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Consolidar blogue em guias e glossário"
            git push
          fi
