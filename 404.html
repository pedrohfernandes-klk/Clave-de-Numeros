<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Página não encontrada · Clave de Números</title>
<meta name="robots" content="noindex,follow">
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#fbfcff;color:#14213d;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}main{max-width:620px;background:#fff;border:1px solid #e4eaf2;border-radius:16px;padding:32px;box-shadow:0 20px 50px rgba(20,33,61,.08)}h1{margin-top:0;font-size:clamp(2rem,7vw,4rem);line-height:1.04;font-weight:600;letter-spacing:-.02em}a{display:inline-flex;margin-top:16px;padding:12px 18px;border-radius:999px;background:#3569b8;color:#fff;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<main>
<h1>Página não encontrada.</h1>
<p>O endereço pode ter sido alterado ou a página ainda não está publicada.</p>
<a id="home-link" href="pt/">Voltar ao início</a>
</main>
<script>
(function(){
  const onGithub = location.hostname.endsWith('github.io');
  const parts = location.pathname.split('/').filter(Boolean);
  const base = onGithub && parts.length ? '/' + parts[0] + '/' : '/';
  document.getElementById('home-link').href = base + 'pt/';
})();
</script>
</body>
</html>
